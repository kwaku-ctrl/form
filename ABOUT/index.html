
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>My Form</title>

</head>
<body>
    <form>
MY FORM
    </form>
    <form action="https://formsubmit.co/kb6267585@gmail.com" method="POST">
        <input type="hidden" name="captcha" value="false">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter Your Name" required>
        <br>
        <label for="email">Email</label>
        <input type="text" id="email" name="email" placeholder="Enter Your Email" required>
        <br>
        <label for="password">Password</label>
        <input type="password" placeholder=" Enter or password" required>
        <br>
        <label for="dob">Date of birth</label>
        <input type="date" id="dob" name="dob" max="2007-06-18" required>
        <br>
        <label for="place of birth">Place of birth</label>
        <input type="text" id="place of birth" name="place of birth" placeholder=" Entire place of birth" required>
        <br>
        <label for="tel"> Telephone number</label>
        <input type="tel" id="tel" name="phone" required pattern="[0-9]{10}">
        <br>
        <label for="language">Preferred language</label>
        <select name="language" id="language" placeholder="Choose your preffered language">
        <option value="preferred language"> Choose your preferred language </option>
        <option value="english">English</option>
        <option value="Spanish">Spanish</option>
        <option value="french">French</option>
        </select>
        <br>
        <textarea for="message" id="Message" placeholder="Type Your Message" ></textarea>
        <br>
        <label for="skill">Skill</label>
        <select name="skill" id="skill">
            <option value=" Select your preferred skill">Select your preferred skille</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="java">JAVA</option>
            <option value="c++">C++</option>
            <option value="python">Python</option>
        </select>
        <br>
        <input type="submit" placeholder="Submit">

    </form>
